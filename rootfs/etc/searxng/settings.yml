use_default_settings: true

categories_as_tabs:

engines:

general:
  debug: false

plugins:
  searx.plugins.oa_doi_rewrite.SXNGPlugin:
    active: true
  searx.plugins.tracker_url_remover.SXNGPlugin:
    active: true

preferences:
  lock:
    - center_alignment
    - locale

search:
  autocomplete: qwant
  autocomplete_min: 2
  default_lang: en-US
  formats:
    - html
  safe_search: 2

server:
  image_proxy: true
  port: 80

ui:
  default_locale: en
  default_theme: simple
  search_on_category_select: true
  theme_args:
    simple_style: dark

valkey:
  url: unix:///run/valkey/valkey.sock?db=0
